name: Deploy to GitHub Pages

on:
  push:
    branches: [master, main]
  # Transfer haberleri için 30 dakikalık tazeleme yeterli; her çalışma
  # Google News RSS'i derleme sırasında yeniden çeker ve siteyi yayınlar.
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Eşzamanlı dağıtımları engelle; çalışan dağıtımı iptal etme.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Kalite kapısı: kırık kod deploy olmasın (lint → tip → test → derleme).
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      # Teşhis: kulüp başına RSS öğe sayısını logla (build'i bloklamaz).
      - run: npm run check:feeds
        continue-on-error: true
      - run: npm run build
      - run: touch out/.nojekyll
      - uses: actions/configure-pages@v5
        with:
          # İlk çalışmada Pages sitesini otomatik oluştur (source: GitHub Actions).
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # deploy-pages@v4 environment bildirimi zorunlu tutuyor; environment'ın
    # dal politikasına main eklendi (gh-pages yanına), bu yüzden engel yok.
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
